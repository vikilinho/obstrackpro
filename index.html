
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsTrack Pro | Clinical Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    @keyframes soft-pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.15); }
      50% { transform: scale(1.005); box-shadow: 0 0 0 6px rgba(244, 63, 94, 0.05); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
    }
    .animate-urgent {
      animation: soft-pulse 2.5s infinite ease-in-out;
      position: relative;
    }
    .obs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    [x-cloak] { display: none !important; }
    
    .observation-row {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
<script type="importmap">
{

    "react/": "https://esm.sh/react@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
